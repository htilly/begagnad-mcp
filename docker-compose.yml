services:
  begagnad-mcp:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - TRADERA_APP_ID=${TRADERA_APP_ID:-}
      - TRADERA_APP_KEY=${TRADERA_APP_KEY:-}
      - TRADERA_RATE_LIMIT_MAX_CALLS=${TRADERA_RATE_LIMIT_MAX_CALLS:-100}
      - TRADERA_RATE_LIMIT_WINDOW_MS=${TRADERA_RATE_LIMIT_WINDOW_MS:-86400000}
      - TRADERA_HEALTH_CHECK_INTERVAL_MS=${TRADERA_HEALTH_CHECK_INTERVAL_MS:-86400000}
      - TRADERA_RATE_LIMIT_STATE_PATH=${TRADERA_RATE_LIMIT_STATE_PATH:-/data/tradera-rate-limit.json}
    restart: unless-stopped
